<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Video Player</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:#000;min-height:100vh;display:flex;justify-content:center;align-items:center}.c{width:100%;max-width:1200px;padding:20px}.v{display:none;width:100%}video{width:100%;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.8)}.l{text-align:center;color:#fff}.s{border:4px solid rgba(255,255,255,.1);border-top:4px solid #fff;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;margin:0 auto 20px}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></head><body><div class="c"><div class="l" id="l"><div class="s"></div><p>Loading video...</p></div><div class="v" id="v"><video id="p" controls autoplay></video></div></div><script>const u='https://raw.githubusercontent.com/punchbiter/noag/main/';async function a(){const p=new URLSearchParams(window.location.search),i=p.get('v'),k=p.get('x');if(!i||!k){alert('ERROR!');window.location.href='https://www.google.com';return}try{await b(i,k)}catch(e){console.error('Error:',e);alert('ERROR!');window.location.href='https://www.google.com'}}async function b(i,k){const r=await fetch(u+i);if(!r.ok)throw new Error('Failed to fetch video');const a=await r.arrayBuffer(),e=new Uint8Array(a),d=c(e,k);if(!f(d))throw new Error('Invalid decryption');const o=new Blob([d],{type:'video/mp4'}),s=URL.createObjectURL(o),p=document.getElementById('p'),v=document.getElementById('v'),l=document.getElementById('l');p.src=s;p.addEventListener('loadeddata',()=>{l.style.display='none';v.style.display='block'},{once:true});p.addEventListener('error',()=>{alert('ERROR!');window.location.href='https://www.google.com'})}function c(d,k){const b=new TextEncoder().encode(k),r=new Uint8Array(d.length);for(let i=0;i<d.length;i++)r[i]=d[i]^b[i%b.length];return r}function f(d){if(d.length<12)return false;const h=Array.from(d.slice(4,12)).map(b=>String.fromCharCode(b)).join('');return h.includes('ftyp')}a();</script></body></html>
